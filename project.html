<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>project — Mauro Brito</title>
  <base href="/">
  <script>
    try { if (localStorage.getItem('mb_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (_) { }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --fg: #141414;
      --fg2: #4a4a50;
      --border: rgba(0, 0, 0, 0.10);
      --surface: rgba(0, 0, 0, 0.04);
      --nav-bg: rgba(255, 255, 255, 0.78);
      --paper: #fdfdfb;
    }

    [data-theme="dark"] {
      --fg: #f0f0f2;
      --fg2: #b8b8bc;
      --border: rgba(255, 255, 255, 0.10);
      --surface: rgba(255, 255, 255, 0.04);
      --nav-bg: rgba(5, 5, 5, 0.80);
      --paper: #0e0e10;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      color: var(--fg);
      background: var(--paper);
      font-size: 15px;
      line-height: 1.65;
      transition: background 0.35s, color 0.35s;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 36px;
      height: 52px;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.35s, border-color 0.35s;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 22px;
      justify-content: center;
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    .nav-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .nav-link {
      font-size: 13px;
      color: var(--fg2);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }

    .nav-link:hover {
      color: var(--fg);
    }

    .pill-toggle {
      position: relative;
      width: 52px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .pill-toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--fg2);
      top: 3px;
      left: 3px;
      transition: transform 0.25s, background 0.25s;
    }

    [data-theme="dark"] .pill-toggle::after {
      transform: translateX(24px);
      background: var(--fg);
    }

    .pill-toggle:hover::after {
      background: var(--fg);
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 96px 44px 100px;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--fg2);
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .breadcrumb a {
      color: var(--fg2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .breadcrumb a:hover {
      color: var(--fg);
      border-color: var(--fg2);
    }

    .proj-title {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .proj-meta {
      font-size: 13px;
      color: var(--fg2);
      margin-bottom: 4px;
    }

    .proj-desc {
      font-size: 15px;
      color: var(--fg);
      max-width: 640px;
      margin: 14px 0 28px;
      line-height: 1.7;
    }

    .viewer-wrap {
      position: relative;
      width: 100%;
      height: 460px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
    }

    .viewer-hint {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 11px;
      color: var(--fg2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0.7;
      background: var(--paper);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .pcb-stage {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    .pcb-stage:active {
      cursor: grabbing;
    }

    .section-label {
      font-family: 'Open Sauce Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0;
      text-transform: lowercase;
      color: var(--fg2);
      margin: 56px 0 14px;
      font-weight: 700;
    }

    .about-block p {
      font-size: 15px;
      color: var(--fg);
      line-height: 1.75;
      margin-bottom: 14px;
      max-width: 680px;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .file-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }

    .file-card:hover {
      border-color: var(--fg2);
      transform: translateY(-2px);
    }

    .file-card .file-type {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg2);
    }

    .file-card .file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .file-card .file-caption {
      font-size: 12px;
      color: var(--fg2);
      line-height: 1.5;
    }

    .file-card.placeholder {
      border-style: dashed;
      cursor: default;
    }

    .file-card.placeholder:hover {
      transform: none;
      border-color: var(--border);
    }

    .files-empty {
      font-size: 13px;
      color: var(--fg2);
      font-style: italic;
      padding: 18px 4px;
    }

    /* Video embed — spans full row of the files grid */
    .media-video {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .media-video-frame {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .media-video-frame iframe,
    .media-video-frame video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .media-video-frame video {
      object-fit: contain;
      background: #000;
    }

    .media-video .media-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
      padding: 0 2px;
    }

    .media-video .media-meta .file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .media-video .media-meta .file-caption {
      font-size: 12px;
      color: var(--fg2);
    }

    /* Image card — thumbnail on top, metadata below; clicks open full size */
    .media-image {
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }

    .media-image:hover {
      border-color: var(--fg2);
      transform: translateY(-2px);
    }

    .media-image img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    .media-image .media-image-info {
      padding: 10px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .media-image .file-type {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg2);
    }

    .media-image .file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .media-image .file-caption {
      font-size: 12px;
      color: var(--fg2);
      line-height: 1.45;
    }

    .not-found {
      text-align: center;
      padding: 80px 0;
    }

    .not-found h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .not-found p {
      color: var(--fg2);
      margin-bottom: 24px;
    }

    .back-btn {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-btn:hover {
      border-color: var(--fg2);
    }

    @media (max-width: 700px) {
      nav {
        padding: 0 16px;
      }

      main {
        padding: 84px 22px 80px;
      }

      .viewer-wrap {
        height: 340px;
      }

      .proj-title {
        font-size: 24px;
      }
    }

    @media (max-width: 520px) {
      main {
        padding: 76px 16px 60px;
      }

      .viewer-wrap {
        height: 260px;
      }

      .proj-title {
        font-size: 20px;
      }

      .section-label {
        margin: 36px 0 10px;
      }

      .about-block p {
        font-size: 14px;
      }
    }

    html,
    body {
      overflow-x: hidden;
    }

    /* ── model-viewer & overlay components ───────────────────────────────── */
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: transparent;
      --progress-bar-color: transparent;
      --progress-mask: none;
    }

    .viewer-reticle {
      position: absolute;
      pointer-events: none;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 10;
      color: var(--fg2);
    }
    .viewer-reticle.visible { opacity: 0.65; }
    .viewer-reticle::before,
    .viewer-reticle::after {
      content: '';
      position: absolute;
      background: currentColor;
      border-radius: 1px;
    }
    .viewer-reticle::before {
      left: 50%; top: 2px; bottom: 2px;
      width: 1px;
      margin-left: -0.5px;
    }
    .viewer-reticle::after {
      top: 50%; left: 2px; right: 2px;
      height: 1px;
      margin-top: -0.5px;
    }

    .viewer-coords {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 9px;
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      line-height: 1.65;
      color: var(--fg2);
      opacity: 0.5;
      pointer-events: none;
      z-index: 10;
      white-space: pre;
      letter-spacing: 0.04em;
    }

    .viewer-fs-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: var(--nav-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg2);
      opacity: 0.7;
      z-index: 10;
      transition: opacity 0.15s, color 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .viewer-fs-btn:hover { opacity: 1; color: var(--fg); }

    .viewer-wrap:fullscreen,
    .viewer-wrap:-webkit-full-screen,
    .viewer-wrap:-moz-full-screen {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
    }

    /* ── model-viewer loading overlay (matches pcb.js loader style) ──────── */
    .mv-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface, rgba(0,0,0,0.04));
      color: var(--fg, #141414);
      z-index: 5;
      transition: opacity 0.4s ease;
      pointer-events: none;
      user-select: none;
    }
    .mv-loader.hidden { opacity: 0; }
    .mv-loader-ast {
      position: relative;
      width: 44px;
      height: 44px;
      animation: mv-spin 1.6s cubic-bezier(.5,0,.5,1) infinite;
    }
    .mv-loader-arm {
      position: absolute;
      left: 50%; top: 50%;
      width: 4px;
      height: 44px;
      margin-left: -2px;
      margin-top: -22px;
      background: currentColor;
      border-radius: 2px;
    }
    .mv-loader-arm:nth-child(1) { transform: rotate(0deg); }
    .mv-loader-arm:nth-child(2) { transform: rotate(60deg); }
    .mv-loader-arm:nth-child(3) { transform: rotate(120deg); }
    @keyframes mv-spin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.18); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .mv-loader-text {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--fg2, #4a4a50);
    }
    .mv-loader-dots::after {
      content: '';
      display: inline-block;
      width: 18px;
      text-align: left;
      animation: mv-dots 1.4s steps(4) infinite;
    }
    @keyframes mv-dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    .mv-loader-pct {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--fg2, #4a4a50);
      opacity: 0.75;
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-left">
      <a class="nav-name" href="/">mauro brito</a>
    </div>
    <div class="nav-center">
      <a class="nav-link" href="/#projects">&larr; all projects</a>
    </div>
    <div class="nav-right">
      <button class="pill-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </nav>

  <main id="main"></main>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="projects-data.js"></script>
  <script>
    // theme: persist + follow notes' key so toggling stays consistent across pages
    (function () {
      const root = document.documentElement;
      const stored = localStorage.getItem('mb_theme');
      if (stored === 'dark') root.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('mb_theme', next); } catch (_) { }
      });
    })();

    // render project from /project/:id (preferred) or legacy ?id= query
    (function () {
      function getProjectId() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        if (!id) {
          const m = window.location.pathname.match(/^\/project\/([^\/?#]+)/);
          if (m) id = decodeURIComponent(m[1]);
        }
        return id;
      }
      const id = getProjectId();
      const main = document.getElementById('main');
      const proj = id && window.PROJECTS && window.PROJECTS[id];

      if (!proj) {
        main.innerHTML =
          '<div class="not-found">' +
          '<h1>project not found</h1>' +
          '<p>that link doesn’t map to any project i’ve built (yet).</p>' +
          '<a class="back-btn" href="/#projects">back to projects</a>' +
          '</div>';
        document.title = 'not found — Mauro Brito';
        return;
      }

      if (proj.comingSoon) {
        main.innerHTML =
          '<div class="not-found">' +
          '<h1>coming soon</h1>' +
          '<p>this project isn\'t up yet — check back later.</p>' +
          '<a class="back-btn" href="/#projects">back to projects</a>' +
          '</div>';
        document.title = 'coming soon — Mauro Brito';
        return;
      }

      document.title = proj.name + ' — Mauro Brito';

      // ---- header ----
      const head = document.createElement('div');
      head.innerHTML =
        '<div class="breadcrumb"><a href="/#projects">projects</a> &nbsp;/&nbsp; <span></span></div>' +
        '<h1 class="proj-title"></h1>' +
        '<div class="proj-meta"></div>' +
        '<p class="proj-desc"></p>';
      head.querySelector('.breadcrumb span').textContent = proj.name;
      head.querySelector('.proj-title').textContent = proj.name;
      head.querySelector('.proj-meta').textContent = proj.meta;
      head.querySelector('.proj-desc').textContent = proj.desc;
      main.appendChild(head);

      // ---- interactive viewer (model-viewer) ----
      const touchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      const viewerWrap = document.createElement('div');
      viewerWrap.className = 'viewer-wrap';

      const enterFsIcon = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9"/></svg>';
      const exitFsIcon  = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M5 1v4H1M13 5H9V1M9 13v-4h4M1 9h4v4"/></svg>';

      viewerWrap.innerHTML =
        '<div class="viewer-hint">drag to rotate · ' + (touchDevice ? 'pinch to zoom' : 'scroll to zoom') + '</div>' +
        '<model-viewer id="mv" camera-controls shadow-intensity="0.8" exposure="1.05"' +
        ' camera-orbit="' + (proj.pcb.mvCameraOrbit || '45deg 72deg auto') + '"' +
        (proj.pcb.mvCameraTarget ? ' camera-target="' + proj.pcb.mvCameraTarget + '"' : '') +
        (proj.pcb.mvMinOrbit ? ' min-camera-orbit="' + proj.pcb.mvMinOrbit + '"' : '') +
        ' loading="eager"' +
        ' style="width:100%;height:100%;background-color:transparent;">' +
        '<div slot="progress-bar" style="display:none;"></div>' +
        '</model-viewer>' +
        '<div class="viewer-reticle" id="mvReticle"></div>' +
        '<div class="viewer-coords" id="mvCoords"></div>' +
        '<button class="viewer-fs-btn" id="mvFsBtn" title="Fullscreen" aria-label="Toggle fullscreen">' + enterFsIcon + '</button>' +
        '<div class="mv-loader" id="mvLoader">' +
        '<div class="mv-loader-ast"><span class="mv-loader-arm"></span><span class="mv-loader-arm"></span><span class="mv-loader-arm"></span></div>' +
        '<div class="mv-loader-text">loading 3d model<span class="mv-loader-dots"></span></div>' +
        '<div class="mv-loader-pct">0%</div>' +
        '</div>';

      main.appendChild(viewerWrap);

      const mv       = document.getElementById('mv');
      const mvLoader = document.getElementById('mvLoader');
      const mvPct    = mvLoader && mvLoader.querySelector('.mv-loader-pct');
      const mvReticle = document.getElementById('mvReticle');
      const mvCoords  = document.getElementById('mvCoords');
      const mvFsBtn   = document.getElementById('mvFsBtn');

      // Choose model source: mobile → draco&mobile GLB, desktop → full-quality GLB
      const modelSrc = touchDevice
        ? (proj.pcb.glbPath || '')
        : (proj.pcb.glbPathFull || proj.pcb.glbPath || '');
      if (modelSrc && mv) mv.setAttribute('src', modelSrc);

      // Loading progress + hide loader on complete
      if (mv && mvLoader) {
        mv.addEventListener('progress', function (e) {
          if (mvPct && e.detail && e.detail.totalProgress !== undefined) {
            mvPct.textContent = Math.round(e.detail.totalProgress * 100) + '%';
          }
        });
        function dismissLoader() {
          mvLoader.classList.add('hidden');
          setTimeout(function () { if (mvLoader.parentNode) mvLoader.parentNode.removeChild(mvLoader); }, 450);
        }
        mv.addEventListener('load',  dismissLoader);
        mv.addEventListener('error', dismissLoader);
      }

      // Camera coordinates overlay (bottom-left) — updates on every camera-change
      if (mv && mvCoords) {
        function updateCoords() {
          try {
            var o = mv.getCameraOrbit();
            var t = mv.getCameraTarget();
            var deg = function (r) { return (r * 180 / Math.PI).toFixed(1); };
            mvCoords.textContent =
              'θ ' + deg(o.theta) + '°  φ ' + deg(o.phi) + '°  r ' + o.radius.toFixed(2) + 'm\n' +
              't  ' + t.x.toFixed(2) + '  ' + t.y.toFixed(2) + '  ' + t.z.toFixed(2);
          } catch (_) {}
        }
        mv.addEventListener('camera-change', updateCoords);
        mv.addEventListener('load', updateCoords);
      }

      // Pointer-tracking reticle (crosshair follows cursor inside viewer)
      if (mvReticle) {
        viewerWrap.addEventListener('pointermove', function (e) {
          var rect = viewerWrap.getBoundingClientRect();
          mvReticle.style.left = (e.clientX - rect.left) + 'px';
          mvReticle.style.top  = (e.clientY - rect.top)  + 'px';
          mvReticle.classList.add('visible');
        });
        viewerWrap.addEventListener('pointerleave', function () {
          mvReticle.classList.remove('visible');
        });
      }

      // Fullscreen toggle
      if (mvFsBtn) {
        mvFsBtn.addEventListener('click', function () {
          if (!document.fullscreenElement) {
            viewerWrap.requestFullscreen && viewerWrap.requestFullscreen().catch(function () {});
          } else {
            document.exitFullscreen && document.exitFullscreen();
          }
        });
        document.addEventListener('fullscreenchange', function () {
          mvFsBtn.innerHTML = document.fullscreenElement ? exitFsIcon : enterFsIcon;
        });
      }

      // PCB-style rotation inertia: EMA velocity + 0.94 friction (from pcb.js)
      if (mv) {
        var _isDrag = false, _pTheta = null, _pPhi = null, _pTime = null;
        var _vTheta = 0, _vPhi = 0;
        var _oTheta, _oPhi, _oRad, _iRaf = null;

        function _sync() {
          try { var o = mv.getCameraOrbit(); _oTheta = o.theta; _oPhi = o.phi; _oRad = o.radius; } catch (_) {}
        }

        mv.addEventListener('load', _sync);

        mv.addEventListener('pointerdown', function () {
          _isDrag = true; _vTheta = 0; _vPhi = 0; _pTheta = null;
          if (_iRaf) { cancelAnimationFrame(_iRaf); _iRaf = null; }
        });

        mv.addEventListener('camera-change', function () {
          _sync();
          if (!_isDrag) return;
          var now = performance.now();
          if (_pTheta !== null) {
            var dt = Math.max(1, now - _pTime);
            _vTheta = _vTheta * 0.55 + ((_oTheta - _pTheta) / dt) * 0.45;
            _vPhi   = _vPhi   * 0.55 + ((_oPhi   - _pPhi)   / dt) * 0.45;
          }
          _pTheta = _oTheta; _pPhi = _oPhi; _pTime = now;
        });

        mv.addEventListener('pointerup', function () {
          _isDrag = false; _sync();
          var _last = performance.now();
          (function _tick() {
            var now = performance.now(), dt = Math.min(48, now - _last); _last = now;
            var f = Math.pow(0.94, dt / 16);
            _vTheta *= f; _vPhi *= f;
            if (Math.abs(_vTheta) < 1e-7) _vTheta = 0;
            if (Math.abs(_vPhi)   < 1e-7) _vPhi   = 0;
            if (!_vTheta && !_vPhi) { _iRaf = null; return; }
            _oTheta += _vTheta * dt;
            _oPhi    = Math.max(0.01, Math.min(Math.PI - 0.01, _oPhi + _vPhi * dt));
            try { mv.setAttribute('camera-orbit', _oTheta + 'rad ' + _oPhi + 'rad ' + _oRad + 'm'); } catch (_) {}
            _iRaf = requestAnimationFrame(_tick);
          })();
        });
      }

      // ---- about ----
      const aboutLabel = document.createElement('div');
      aboutLabel.className = 'section-label';
      aboutLabel.textContent = 'About';
      main.appendChild(aboutLabel);

      const aboutBlock = document.createElement('div');
      aboutBlock.className = 'about-block';
      const longDesc = Array.isArray(proj.longDesc) ? proj.longDesc : [proj.longDesc || proj.desc];
      longDesc.forEach(p => {
        const el = document.createElement('p');
        el.textContent = p;
        aboutBlock.appendChild(el);
      });
      main.appendChild(aboutBlock);

      // ---- files & media ----
      const filesLabel = document.createElement('div');
      filesLabel.className = 'section-label';
      filesLabel.textContent = 'Files & media';
      main.appendChild(filesLabel);

      const filesGrid = document.createElement('div');
      filesGrid.className = 'files-grid';

      const media = Array.isArray(proj.media) ? proj.media : [];
      if (media.length) {
        media.forEach(m => {
          // Video embed — spans full grid row.
          // YouTube videos use `youtube: '<id>'`; local mp4s use `url: '...'`.
          if (m.type === 'video' && (m.youtube || m.url)) {
            const block = document.createElement('div');
            block.className = 'media-video';
            const frameInner = m.youtube
              ? '<iframe src="https://www.youtube.com/embed/' + m.youtube + '" ' +
                'title="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" ' +
                'referrerpolicy="strict-origin-when-cross-origin" allowfullscreen loading="lazy"></iframe>'
              : '<video src="' + m.url + '" controls preload="metadata" playsinline></video>';
            block.innerHTML =
              '<div class="media-video-frame">' + frameInner + '</div>' +
              '<div class="media-meta">' +
              '<span class="file-name"></span>' +
              '<span class="file-caption"></span>' +
              '</div>';
            const iframe = block.querySelector('iframe');
            if (iframe) iframe.title = m.name || 'video';
            block.querySelector('.file-name').textContent = m.name || 'video';
            block.querySelector('.file-caption').textContent = m.caption || '';
            filesGrid.appendChild(block);
            return;
          }

          // Inline image card — thumbnail + caption, click opens full size
          if (m.type === 'image' && m.url) {
            const card = document.createElement('a');
            card.className = 'media-image';
            card.href = m.url;
            card.target = '_blank';
            card.rel = 'noopener';
            card.innerHTML =
              '<img alt="" loading="lazy">' +
              '<div class="media-image-info">' +
              '<span class="file-name"></span>' +
              '<span class="file-caption"></span>' +
              '</div>';
            const img = card.querySelector('img');
            img.src = m.url;
            img.alt = m.name || '';
            card.querySelector('.file-name').textContent = m.name || '(untitled)';
            card.querySelector('.file-caption').textContent = m.caption || '';
            filesGrid.appendChild(card);
            return;
          }

          // Fallback: text-only file card (links, datasheets, etc.)
          const card = document.createElement('a');
          card.className = 'file-card';
          card.href = m.url || '#';
          if (m.url && /^https?:/i.test(m.url)) {
            card.target = '_blank';
            card.rel = 'noopener';
          }
          card.innerHTML =
            '<span class="file-type"></span>' +
            '<span class="file-name"></span>' +
            '<span class="file-caption"></span>';
          card.querySelector('.file-type').textContent = m.type || 'file';
          card.querySelector('.file-name').textContent = m.name || '(untitled)';
          card.querySelector('.file-caption').textContent = m.caption || '';
          filesGrid.appendChild(card);
        });
      } else {
        const empty = document.createElement('div');
        empty.className = 'files-empty';
        empty.textContent = 'no files uploaded yet — schematics, photos, and demo clips coming soon.';
        main.appendChild(empty);
      }
      if (media.length) main.appendChild(filesGrid);
    })();
  </script>
  <script src="/site.js"></script>
</body>

</html>
