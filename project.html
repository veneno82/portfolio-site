<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>project — Mauro Brito</title>
  <base href="/">
  <script>
    try { if (localStorage.getItem('mb_theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (_) { }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sauce+Sans:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --fg: #141414;
      --fg2: #4a4a50;
      --border: rgba(0, 0, 0, 0.10);
      --surface: rgba(0, 0, 0, 0.04);
      --nav-bg: rgba(255, 255, 255, 0.78);
      --paper: #fdfdfb;
    }

    [data-theme="dark"] {
      --fg: #f0f0f2;
      --fg2: #b8b8bc;
      --border: rgba(255, 255, 255, 0.10);
      --surface: rgba(255, 255, 255, 0.04);
      --nav-bg: rgba(5, 5, 5, 0.80);
      --paper: #0e0e10;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
      color: var(--fg);
      background: var(--paper);
      font-size: 15px;
      line-height: 1.65;
      transition: background 0.35s, color 0.35s;
      min-height: 100vh;
    }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 36px;
      height: 52px;
      background: var(--nav-bg);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.35s, border-color 0.35s;
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .nav-center {
      display: flex;
      align-items: center;
      gap: 22px;
      justify-content: center;
    }

    .nav-right {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 16px;
    }

    .nav-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--fg);
      letter-spacing: -0.01em;
      text-decoration: none;
    }

    .nav-link {
      font-size: 13px;
      color: var(--fg2);
      text-decoration: none;
      letter-spacing: 0.01em;
      transition: color 0.15s;
    }

    .nav-link:hover {
      color: var(--fg);
    }

    .pill-toggle {
      position: relative;
      width: 52px;
      height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .pill-toggle::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--fg2);
      top: 3px;
      left: 3px;
      transition: transform 0.25s, background 0.25s;
    }

    [data-theme="dark"] .pill-toggle::after {
      transform: translateX(24px);
      background: var(--fg);
    }

    .pill-toggle:hover::after {
      background: var(--fg);
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 96px 44px 100px;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--fg2);
      letter-spacing: 0.04em;
      margin-bottom: 14px;
    }

    .breadcrumb a {
      color: var(--fg2);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .breadcrumb a:hover {
      color: var(--fg);
      border-color: var(--fg2);
    }

    .proj-title {
      font-size: 30px;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .proj-meta {
      font-size: 13px;
      color: var(--fg2);
      margin-bottom: 4px;
    }

    .proj-desc {
      font-size: 15px;
      color: var(--fg);
      max-width: 640px;
      margin: 14px 0 28px;
      line-height: 1.7;
    }

    .viewer-wrap {
      position: relative;
      width: 100%;
      height: 460px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      overflow: hidden;
      /* Prevent mobile text selection / page-scroll when dragging on the model */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      touch-action: none;
    }

    .viewer-hint {
      position: absolute;
      top: 12px;
      left: 14px;
      font-size: 11px;
      color: var(--fg2);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      pointer-events: none;
      opacity: 0.7;
      background: var(--paper);
      padding: 3px 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }

    .pcb-stage {
      width: 100%;
      height: 100%;
      cursor: grab;
    }

    .pcb-stage:active {
      cursor: grabbing;
    }

    .section-label {
      font-family: 'Open Sauce Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-size: 13px;
      letter-spacing: 0;
      text-transform: lowercase;
      color: var(--fg2);
      margin: 56px 0 14px;
      font-weight: 700;
    }

    .about-block p {
      font-size: 15px;
      color: var(--fg);
      line-height: 1.75;
      margin-bottom: 14px;
      max-width: 680px;
    }

    .files-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 14px;
    }

    .file-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      padding: 18px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s;
    }

    .file-card:hover {
      border-color: var(--fg2);
      transform: translateY(-2px);
    }

    .file-card .file-type {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--fg2);
    }

    .file-card .file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .file-card .file-caption {
      font-size: 12px;
      color: var(--fg2);
      line-height: 1.5;
    }

    .file-card.placeholder {
      border-style: dashed;
      cursor: default;
    }

    .file-card.placeholder:hover {
      transform: none;
      border-color: var(--border);
    }

    .files-empty {
      font-size: 13px;
      color: var(--fg2);
      font-style: italic;
      padding: 18px 4px;
    }

    /* Video embed — spans full row of the files grid */
    .media-video {
      grid-column: 1 / -1;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .media-video-frame {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: #000;
    }

    .media-video-frame iframe,
    .media-video-frame video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    .media-video-frame video {
      object-fit: contain;
      background: #000;
    }

    .media-video .media-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: baseline;
      padding: 0 2px;
    }

    .media-video .media-meta .file-name {
      font-size: 13px;
      font-weight: 500;
    }

    .media-video .media-meta .file-caption {
      font-size: 12px;
      color: var(--fg2);
    }

    /* ── Media grid (image + video cards) ─────────────────────────────── */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .media-card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      cursor: zoom-in;
      transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
      /* Mobile: prevent double-tap-zoom + accidental text selection on tap */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    .media-card:hover {
      border-color: var(--fg2);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px -20px rgba(0, 0, 0, 0.35);
    }

    .media-card.wide {
      grid-column: 1 / -1;
    }

    .media-thumb {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background:
        repeating-linear-gradient(45deg,
          rgba(127, 127, 127, 0.04) 0 6px,
          rgba(127, 127, 127, 0.08) 6px 12px);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border-bottom: 1px solid var(--border);
    }

    .media-card.wide .media-thumb {
      aspect-ratio: 16 / 7;
    }

    .media-thumb img,
    .media-thumb video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s cubic-bezier(.2, .7, .2, 1);
      pointer-events: none;
    }

    /* schematics/diagrams: show the whole drawing — no cropping */
    .media-card[data-type="schematic"] .media-thumb img,
    .media-card[data-type="diagram"] .media-thumb img {
      object-fit: contain;
      padding: 14px;
      background: var(--paper);
    }

    [data-theme="dark"] .media-card[data-type="schematic"] .media-thumb img {
      filter: invert(0.92) hue-rotate(180deg);
    }

    .media-card:hover .media-thumb img,
    .media-card:hover .media-thumb video {
      transform: scale(1.025);
    }

    .media-type-tag {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--fg2);
      background: var(--nav-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 5px;
      font-weight: 500;
      pointer-events: none;
    }

    .media-play {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--nav-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg);
      pointer-events: none;
      transition: transform 0.2s;
    }

    .media-card:hover .media-play {
      transform: translate(-50%, -50%) scale(1.08);
    }

    .media-play svg {
      margin-left: 3px;
    }

    .media-meta {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .media-name {
      font-size: 13.5px;
      font-weight: 500;
      letter-spacing: -0.005em;
    }

    .media-caption {
      font-size: 12px;
      color: var(--fg2);
      line-height: 1.55;
    }

    /* ── Lightbox (theme-aware: light bg in light mode, dark in dark) ─── */
    .lightbox {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: var(--paper);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 56px 60px;
      opacity: 0;
      transition: opacity 0.22s ease;
    }

    [data-theme="dark"] .lightbox {
      background: rgba(8, 8, 10, 0.96);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .lightbox.open {
      display: flex;
      opacity: 1;
    }

    .lightbox-stage {
      position: relative;
      max-width: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .lightbox-media {
      max-width: min(1400px, 100%);
      max-height: calc(100vh - 160px);
      object-fit: contain;
      border-radius: 6px;
      background: var(--surface);
      box-shadow: 0 12px 60px -22px rgba(0, 0, 0, 0.35);
    }

    .lightbox video.lightbox-media {
      background: #000;
    }

    /* Schematic invert in dark mode (inside lightbox too) */
    [data-theme="dark"] .lightbox-media[data-type="schematic"] {
      filter: invert(0.92) hue-rotate(180deg);
      background: #f4f4f4;
    }

    .lightbox-caption {
      color: var(--fg2);
      font-size: 13px;
      max-width: 720px;
      text-align: center;
      line-height: 1.55;
    }

    .lightbox-caption strong {
      display: block;
      color: var(--fg);
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 3px;
      letter-spacing: -0.005em;
    }

    .lightbox-btn {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--fg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .lightbox-btn:hover {
      background: var(--border);
      border-color: var(--fg2);
    }

    .lightbox-prev { left: 18px; }
    .lightbox-next { right: 18px; }

    .lightbox-close {
      top: 18px;
      right: 18px;
      transform: none;
    }

    .lightbox-counter {
      position: fixed;
      top: 24px;
      left: 22px;
      font-family: 'Open Sauce Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.08em;
      color: var(--fg2);
      font-variant-numeric: tabular-nums;
    }

    @media (max-width: 600px) {
      .media-grid { grid-template-columns: 1fr; gap: 12px; }
      .lightbox { padding: 48px 14px; }
      .lightbox-btn { width: 36px; height: 36px; }
      .lightbox-prev { left: 8px; }
      .lightbox-next { right: 8px; }
    }

    .not-found {
      text-align: center;
      padding: 80px 0;
    }

    .not-found h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .not-found p {
      color: var(--fg2);
      margin-bottom: 24px;
    }

    .back-btn {
      display: inline-block;
      padding: 8px 18px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--fg);
      text-decoration: none;
      font-size: 13px;
      transition: border-color 0.15s, color 0.15s;
    }

    .back-btn:hover {
      border-color: var(--fg2);
    }

    @media (max-width: 700px) {
      nav {
        padding: 0 16px;
      }

      main {
        padding: 84px 22px 80px;
      }

      .viewer-wrap {
        height: 340px;
      }

      .proj-title {
        font-size: 24px;
      }
    }

    @media (max-width: 520px) {
      main {
        padding: 76px 16px 60px;
      }

      .viewer-wrap {
        height: 260px;
      }

      .proj-title {
        font-size: 20px;
      }

      .section-label {
        margin: 36px 0 10px;
      }

      .about-block p {
        font-size: 14px;
      }
    }

    html,
    body {
      overflow-x: hidden;
    }

    /* ── model-viewer & overlay components ───────────────────────────────── */
    model-viewer {
      width: 100%;
      height: 100%;
      background-color: transparent;
      --progress-bar-color: transparent;
      --progress-mask: none;
    }

    .viewer-reticle {
      position: absolute;
      pointer-events: none;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 10;
      color: var(--fg2);
    }
    .viewer-reticle.visible { opacity: 0.65; }
    .viewer-reticle::before,
    .viewer-reticle::after {
      content: '';
      position: absolute;
      background: currentColor;
      border-radius: 1px;
    }
    .viewer-reticle::before {
      left: 50%; top: 2px; bottom: 2px;
      width: 1px;
      margin-left: -0.5px;
    }
    .viewer-reticle::after {
      top: 50%; left: 2px; right: 2px;
      height: 1px;
      margin-top: -0.5px;
    }

    .viewer-coords {
      position: absolute;
      bottom: 10px;
      left: 12px;
      font-size: 9px;
      font-family: 'SF Mono', 'Fira Mono', 'Consolas', monospace;
      line-height: 1.65;
      color: var(--fg2);
      opacity: 0.5;
      pointer-events: none;
      z-index: 10;
      white-space: pre;
      letter-spacing: 0.04em;
    }

    .viewer-fs-btn {
      position: absolute;
      top: 10px;
      right: 12px;
      width: 28px;
      height: 28px;
      background: var(--nav-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--fg2);
      opacity: 0.7;
      z-index: 10;
      transition: opacity 0.15s, color 0.15s;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .viewer-fs-btn:hover { opacity: 1; color: var(--fg); }

    .viewer-wrap:fullscreen,
    .viewer-wrap:-webkit-full-screen,
    .viewer-wrap:-moz-full-screen {
      width: 100vw;
      height: 100vh;
      border-radius: 0;
      border: none;
      /* Without an explicit bg the browser fills fullscreen with black,
         which looks wrong in light mode. Use the theme paper color. */
      background: var(--paper);
    }

    /* ── model-viewer loading overlay (matches pcb.js loader style) ──────── */
    .mv-loader {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--surface, rgba(0,0,0,0.04));
      color: var(--fg, #141414);
      z-index: 5;
      transition: opacity 0.4s ease;
      pointer-events: none;
      user-select: none;
    }
    .mv-loader.hidden { opacity: 0; }
    .mv-loader-ast {
      position: relative;
      width: 44px;
      height: 44px;
      animation: mv-spin 1.6s cubic-bezier(.5,0,.5,1) infinite;
    }
    .mv-loader-arm {
      position: absolute;
      left: 50%; top: 50%;
      width: 4px;
      height: 44px;
      margin-left: -2px;
      margin-top: -22px;
      background: currentColor;
      border-radius: 2px;
    }
    .mv-loader-arm:nth-child(1) { transform: rotate(0deg); }
    .mv-loader-arm:nth-child(2) { transform: rotate(60deg); }
    .mv-loader-arm:nth-child(3) { transform: rotate(120deg); }
    @keyframes mv-spin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.18); }
      100% { transform: rotate(360deg) scale(1); }
    }
    .mv-loader-text {
      font-size: 12px;
      letter-spacing: 0.06em;
      color: var(--fg2, #4a4a50);
    }
    .mv-loader-dots::after {
      content: '';
      display: inline-block;
      width: 18px;
      text-align: left;
      animation: mv-dots 1.4s steps(4) infinite;
    }
    @keyframes mv-dots {
      0%   { content: ''; }
      25%  { content: '.'; }
      50%  { content: '..'; }
      75%  { content: '...'; }
      100% { content: ''; }
    }
    .mv-loader-pct {
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.04em;
      color: var(--fg2, #4a4a50);
      opacity: 0.75;
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-left">
      <a class="nav-name" href="/">mauro brito</a>
    </div>
    <div class="nav-center">
      <a class="nav-link" href="/#projects">&larr; all projects</a>
    </div>
    <div class="nav-right">
      <button class="pill-toggle" id="themeToggle" aria-label="Toggle theme"></button>
    </div>
  </nav>

  <main id="main"></main>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
  <script src="projects-data.js"></script>
  <script>
    // theme: persist + follow notes' key so toggling stays consistent across pages
    (function () {
      const root = document.documentElement;
      const stored = localStorage.getItem('mb_theme');
      if (stored === 'dark') root.setAttribute('data-theme', 'dark');
      document.getElementById('themeToggle').addEventListener('click', () => {
        const next = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', next);
        try { localStorage.setItem('mb_theme', next); } catch (_) { }
      });
    })();

    // render project from /project/:id (preferred) or legacy ?id= query
    (function () {
      function getProjectId() {
        const params = new URLSearchParams(window.location.search);
        let id = params.get('id');
        if (!id) {
          const m = window.location.pathname.match(/^\/project\/([^\/?#]+)/);
          if (m) id = decodeURIComponent(m[1]);
        }
        return id;
      }
      const id = getProjectId();
      const main = document.getElementById('main');
      const proj = id && window.PROJECTS && window.PROJECTS[id];

      if (!proj) {
        main.innerHTML =
          '<div class="not-found">' +
          '<h1>project not found</h1>' +
          '<p>that link doesn’t map to any project i’ve built (yet).</p>' +
          '<a class="back-btn" href="/#projects">back to projects</a>' +
          '</div>';
        document.title = 'not found — Mauro Brito';
        return;
      }

      if (proj.comingSoon) {
        main.innerHTML =
          '<div class="not-found">' +
          '<h1>coming soon</h1>' +
          '<p>this project isn\'t up yet — check back later.</p>' +
          '<a class="back-btn" href="/#projects">back to projects</a>' +
          '</div>';
        document.title = 'coming soon — Mauro Brito';
        return;
      }

      document.title = proj.name + ' — Mauro Brito';

      // ---- header ----
      const head = document.createElement('div');
      head.innerHTML =
        '<div class="breadcrumb"><a href="/#projects">projects</a> &nbsp;/&nbsp; <span></span></div>' +
        '<h1 class="proj-title"></h1>' +
        '<div class="proj-meta"></div>' +
        '<p class="proj-desc"></p>';
      head.querySelector('.breadcrumb span').textContent = proj.name;
      head.querySelector('.proj-title').textContent = proj.name;
      head.querySelector('.proj-meta').textContent = proj.meta;
      head.querySelector('.proj-desc').textContent = proj.desc;
      main.appendChild(head);

      // ---- interactive viewer (model-viewer) ----
      const touchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
      const viewerWrap = document.createElement('div');
      viewerWrap.className = 'viewer-wrap';

      const enterFsIcon = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9"/></svg>';
      const exitFsIcon  = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M5 1v4H1M13 5H9V1M9 13v-4h4M1 9h4v4"/></svg>';

      viewerWrap.innerHTML =
        '<div class="viewer-hint">drag to rotate · ' + (touchDevice ? 'pinch to zoom' : 'scroll to zoom') + '</div>' +
        '<model-viewer id="mv" camera-controls shadow-intensity="0.8" exposure="1.05"' +
        ' camera-orbit="' + (proj.pcb.mvCameraOrbit || '45deg 72deg auto') + '"' +
        (proj.pcb.mvCameraTarget ? ' camera-target="' + proj.pcb.mvCameraTarget + '"' : '') +
        (proj.pcb.mvMinOrbit ? ' min-camera-orbit="' + proj.pcb.mvMinOrbit + '"' : '') +
        ' loading="eager"' +
        ' style="width:100%;height:100%;background-color:transparent;">' +
        '<div slot="progress-bar" style="display:none;"></div>' +
        '</model-viewer>' +
        '<div class="viewer-reticle" id="mvReticle"></div>' +
        '<div class="viewer-coords" id="mvCoords"></div>' +
        '<button class="viewer-fs-btn" id="mvFsBtn" title="Fullscreen" aria-label="Toggle fullscreen">' + enterFsIcon + '</button>' +
        '<div class="mv-loader" id="mvLoader">' +
        '<div class="mv-loader-ast"><span class="mv-loader-arm"></span><span class="mv-loader-arm"></span><span class="mv-loader-arm"></span></div>' +
        '<div class="mv-loader-text">loading 3d model<span class="mv-loader-dots"></span></div>' +
        '<div class="mv-loader-pct">0%</div>' +
        '</div>';

      main.appendChild(viewerWrap);

      const mv       = document.getElementById('mv');
      const mvLoader = document.getElementById('mvLoader');
      const mvPct    = mvLoader && mvLoader.querySelector('.mv-loader-pct');
      const mvReticle = document.getElementById('mvReticle');
      const mvCoords  = document.getElementById('mvCoords');
      const mvFsBtn   = document.getElementById('mvFsBtn');

      // Choose model source: mobile → draco&mobile GLB, desktop → full-quality GLB
      const modelSrc = touchDevice
        ? (proj.pcb.glbPath || '')
        : (proj.pcb.glbPathFull || proj.pcb.glbPath || '');
      if (modelSrc && mv) mv.setAttribute('src', modelSrc);

      // Loading progress + hide loader on complete
      if (mv && mvLoader) {
        mv.addEventListener('progress', function (e) {
          if (mvPct && e.detail && e.detail.totalProgress !== undefined) {
            mvPct.textContent = Math.round(e.detail.totalProgress * 100) + '%';
          }
        });
        function dismissLoader() {
          mvLoader.classList.add('hidden');
          setTimeout(function () { if (mvLoader.parentNode) mvLoader.parentNode.removeChild(mvLoader); }, 450);
        }
        mv.addEventListener('load',  dismissLoader);
        mv.addEventListener('error', dismissLoader);
      }

      // Camera coordinates overlay (bottom-left) — updates on every camera-change
      if (mv && mvCoords) {
        function updateCoords() {
          try {
            var o = mv.getCameraOrbit();
            var t = mv.getCameraTarget();
            var deg = function (r) { return (r * 180 / Math.PI).toFixed(1); };
            mvCoords.textContent =
              'θ ' + deg(o.theta) + '°  φ ' + deg(o.phi) + '°  r ' + o.radius.toFixed(2) + 'm\n' +
              't  ' + t.x.toFixed(2) + '  ' + t.y.toFixed(2) + '  ' + t.z.toFixed(2);
          } catch (_) {}
        }
        mv.addEventListener('camera-change', updateCoords);
        mv.addEventListener('load', updateCoords);
      }

      // Pointer-tracking reticle (crosshair follows cursor inside viewer)
      if (mvReticle) {
        viewerWrap.addEventListener('pointermove', function (e) {
          var rect = viewerWrap.getBoundingClientRect();
          mvReticle.style.left = (e.clientX - rect.left) + 'px';
          mvReticle.style.top  = (e.clientY - rect.top)  + 'px';
          mvReticle.classList.add('visible');
        });
        viewerWrap.addEventListener('pointerleave', function () {
          mvReticle.classList.remove('visible');
        });
      }

      // Fullscreen toggle
      if (mvFsBtn) {
        mvFsBtn.addEventListener('click', function () {
          if (!document.fullscreenElement) {
            viewerWrap.requestFullscreen && viewerWrap.requestFullscreen().catch(function () {});
          } else {
            document.exitFullscreen && document.exitFullscreen();
          }
        });
        document.addEventListener('fullscreenchange', function () {
          mvFsBtn.innerHTML = document.fullscreenElement ? exitFsIcon : enterFsIcon;
        });
      }

      // PCB-style rotation inertia: EMA velocity + 0.94 friction (from pcb.js)
      if (mv) {
        var _isDrag = false, _pTheta = null, _pPhi = null, _pTime = null;
        var _vTheta = 0, _vPhi = 0;
        var _oTheta, _oPhi, _oRad, _iRaf = null;

        function _sync() {
          try { var o = mv.getCameraOrbit(); _oTheta = o.theta; _oPhi = o.phi; _oRad = o.radius; } catch (_) {}
        }

        mv.addEventListener('load', _sync);

        mv.addEventListener('pointerdown', function () {
          _isDrag = true; _vTheta = 0; _vPhi = 0; _pTheta = null;
          if (_iRaf) { cancelAnimationFrame(_iRaf); _iRaf = null; }
        });

        mv.addEventListener('camera-change', function () {
          _sync();
          if (!_isDrag) return;
          var now = performance.now();
          if (_pTheta !== null) {
            var dt = Math.max(1, now - _pTime);
            _vTheta = _vTheta * 0.55 + ((_oTheta - _pTheta) / dt) * 0.45;
            _vPhi   = _vPhi   * 0.55 + ((_oPhi   - _pPhi)   / dt) * 0.45;
          }
          _pTheta = _oTheta; _pPhi = _oPhi; _pTime = now;
        });

        mv.addEventListener('pointerup', function () {
          _isDrag = false; _sync();
          var _last = performance.now();
          (function _tick() {
            var now = performance.now(), dt = Math.min(48, now - _last); _last = now;
            var f = Math.pow(0.94, dt / 16);
            _vTheta *= f; _vPhi *= f;
            if (Math.abs(_vTheta) < 1e-7) _vTheta = 0;
            if (Math.abs(_vPhi)   < 1e-7) _vPhi   = 0;
            if (!_vTheta && !_vPhi) { _iRaf = null; return; }
            _oTheta += _vTheta * dt;
            _oPhi    = Math.max(0.01, Math.min(Math.PI - 0.01, _oPhi + _vPhi * dt));
            try { mv.setAttribute('camera-orbit', _oTheta + 'rad ' + _oPhi + 'rad ' + _oRad + 'm'); } catch (_) {}
            _iRaf = requestAnimationFrame(_tick);
          })();
        });
      }

      // ---- about ----
      const aboutLabel = document.createElement('div');
      aboutLabel.className = 'section-label';
      aboutLabel.textContent = 'About';
      main.appendChild(aboutLabel);

      const aboutBlock = document.createElement('div');
      aboutBlock.className = 'about-block';
      const longDesc = Array.isArray(proj.longDesc) ? proj.longDesc : [proj.longDesc || proj.desc];
      longDesc.forEach(p => {
        const el = document.createElement('p');
        el.textContent = p;
        aboutBlock.appendChild(el);
      });
      main.appendChild(aboutBlock);

      // ---- files & media ----
      const filesLabel = document.createElement('div');
      filesLabel.className = 'section-label';
      filesLabel.textContent = 'files & media';
      main.appendChild(filesLabel);

      const media = Array.isArray(proj.media) ? proj.media : [];
      if (!media.length) {
        const empty = document.createElement('div');
        empty.className = 'files-empty';
        empty.textContent = 'no files uploaded yet — schematics, photos, and demo clips coming soon.';
        main.appendChild(empty);
      } else {
        const mediaGrid = document.createElement('div');
        mediaGrid.className = 'media-grid';

        const playSvg = '<svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor"><path d="M5 3.5v11l9-5.5z"/></svg>';

        const lightboxItems = []; // images + videos go into the viewer queue

        media.forEach(m => {
          const kind   = m.kind || (m.youtube ? 'video' : (m.src || m.url ? 'image' : 'file'));
          const isImg  = kind === 'image';
          const isVid  = kind === 'video';
          const isFile = !isImg && !isVid;
          const src    = m.src || m.url || '';

          const card = document.createElement(isFile ? 'a' : 'div');
          card.className = 'media-card' + (m.span === 'wide' ? ' wide' : '');
          card.dataset.type = (m.type || kind).toLowerCase();

          if (isFile) {
            card.href = src;
            if (/^https?:/i.test(src)) { card.target = '_blank'; card.rel = 'noopener'; }
          }

          // thumb
          const thumb = document.createElement('div');
          thumb.className = 'media-thumb';

          if (isImg) {
            const img = document.createElement('img');
            img.src = src;
            img.alt = m.name || '';
            img.loading = 'lazy';
            thumb.appendChild(img);
          } else if (isVid) {
            // Local video poster, OR auto-derive from YouTube ID, OR none
            const poster = m.poster || (m.youtube ? 'https://img.youtube.com/vi/' + m.youtube + '/hqdefault.jpg' : '');
            if (poster) {
              const img = document.createElement('img');
              img.src = poster;
              img.alt = m.name || '';
              img.loading = 'lazy';
              thumb.appendChild(img);
            }
            const play = document.createElement('div');
            play.className = 'media-play';
            play.innerHTML = playSvg;
            thumb.appendChild(play);
          }

          const tag = document.createElement('span');
          tag.className = 'media-type-tag';
          tag.textContent = m.type || kind;
          thumb.appendChild(tag);

          card.appendChild(thumb);

          const meta = document.createElement('div');
          meta.className = 'media-meta';
          meta.innerHTML = '<span class="media-name"></span><span class="media-caption"></span>';
          meta.querySelector('.media-name').textContent = m.name || '(untitled)';
          meta.querySelector('.media-caption').textContent = m.caption || '';
          card.appendChild(meta);

          if (isImg || isVid) {
            const idx = lightboxItems.length;
            lightboxItems.push({
              kind, src,
              name: m.name, caption: m.caption,
              poster: m.poster, youtube: m.youtube,
              type: (m.type || kind).toLowerCase()
            });
            card.addEventListener('click', e => { e.preventDefault(); openLightbox(idx); });
          }

          mediaGrid.appendChild(card);
        });

        main.appendChild(mediaGrid);

        // ---- lightbox ----
        let openLightbox = () => {};
        if (lightboxItems.length) {
          const lb = document.createElement('div');
          lb.className = 'lightbox';
          lb.innerHTML =
            '<div class="lightbox-counter"></div>' +
            '<button class="lightbox-btn lightbox-close" aria-label="Close">' +
            '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 2l10 10M12 2L2 12"/></svg>' +
            '</button>' +
            '<button class="lightbox-btn lightbox-prev" aria-label="Previous">' +
            '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2L4 8l6 6"/></svg>' +
            '</button>' +
            '<button class="lightbox-btn lightbox-next" aria-label="Next">' +
            '<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2l6 6-6 6"/></svg>' +
            '</button>' +
            '<div class="lightbox-stage">' +
            '<div class="lightbox-mediaWrap"></div>' +
            '<div class="lightbox-caption"></div>' +
            '</div>';
          document.body.appendChild(lb);

          const lbWrap    = lb.querySelector('.lightbox-mediaWrap');
          const lbCap     = lb.querySelector('.lightbox-caption');
          const lbCounter = lb.querySelector('.lightbox-counter');
          const btnPrev   = lb.querySelector('.lightbox-prev');
          const btnNext   = lb.querySelector('.lightbox-next');
          const btnClose  = lb.querySelector('.lightbox-close');
          let curIdx = 0;

          function render(i) {
            curIdx = (i + lightboxItems.length) % lightboxItems.length;
            const it = lightboxItems[curIdx];
            lbWrap.innerHTML = '';
            let el;
            if (it.kind === 'video') {
              if (it.youtube) {
                el = document.createElement('iframe');
                el.src = 'https://www.youtube.com/embed/' + it.youtube + '?autoplay=1';
                el.setAttribute('allow', 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share');
                el.setAttribute('allowfullscreen', '');
                el.style.aspectRatio = '16 / 9';
                el.style.width  = 'min(1400px, 90vw)';
                el.style.height = 'auto';
                el.style.maxHeight = 'calc(100vh - 160px)';
                el.style.border = '0';
                el.style.borderRadius = '6px';
                el.style.background = '#000';
              } else {
                el = document.createElement('video');
                el.controls    = true;
                el.autoplay    = true;
                el.playsInline = true;
                if (it.poster) el.poster = it.poster;
                el.src = it.src;
              }
            } else {
              el = document.createElement('img');
              el.src = it.src;
              el.alt = it.name || '';
              if (it.type) el.dataset.type = it.type;
            }
            el.className = 'lightbox-media';
            lbWrap.appendChild(el);
            lbCap.innerHTML = '';
            if (it.name)    { const s = document.createElement('strong'); s.textContent = it.name; lbCap.appendChild(s); }
            if (it.caption) { lbCap.appendChild(document.createTextNode(it.caption)); }
            lbCounter.textContent =
              (curIdx + 1).toString().padStart(2, '0') + ' / ' +
              lightboxItems.length.toString().padStart(2, '0');
            const single = lightboxItems.length < 2;
            btnPrev.style.display = single ? 'none' : '';
            btnNext.style.display = single ? 'none' : '';
            lbCounter.style.display = single ? 'none' : '';
          }

          openLightbox = function (i) {
            render(i);
            lb.classList.add('open');
            document.body.style.overflow = 'hidden';
          };
          function closeLightbox() {
            lb.classList.remove('open');
            lbWrap.innerHTML = '';
            document.body.style.overflow = '';
          }

          btnPrev.addEventListener('click', e => { e.stopPropagation(); render(curIdx - 1); });
          btnNext.addEventListener('click', e => { e.stopPropagation(); render(curIdx + 1); });
          btnClose.addEventListener('click', e => { e.stopPropagation(); closeLightbox(); });
          lb.addEventListener('click', e => { if (e.target === lb || e.target === lb.querySelector('.lightbox-stage')) closeLightbox(); });
          document.addEventListener('keydown', e => {
            if (!lb.classList.contains('open')) return;
            if (e.key === 'Escape')           closeLightbox();
            else if (e.key === 'ArrowLeft')   render(curIdx - 1);
            else if (e.key === 'ArrowRight')  render(curIdx + 1);
          });
        }
      }
    })();
  </script>
  <script src="/site.js"></script>
</body>

</html>
